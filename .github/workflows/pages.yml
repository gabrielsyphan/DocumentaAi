# Publica a landing page (pasta website/) no GitHub Pages.
# URL: https://gabrielsyphan.github.io/documentaai/
name: Deploy site (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela o que já está no ar
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita o Pages automaticamente na primeira execução
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
